name: Build
run-name: "1.0.${{ github.run_number }} • Build • ${{ github.event.pull_request.title != '' && github.event.pull_request.title || github.head_ref || github.ref_name }}"
on:
  push:
  workflow_dispatch:
env:
  MAJOR_VERSION: 1
  MINOR_VERSION: 0

jobs:
  integration-build:
    name: Integration Build
    runs-on: windows-latest
    concurrency:
      # Integration Build will be cancelled when new commits arrive on the branch.
      # To protect the master branch, use ${{ github.ref != 'refs/heads/master' }} for cancel-in-progress:
      group: build-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      checks: write
      pull-requests: write
    env:
      BUILD_CONFIGURATION: Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Set Version
        shell: pwsh
        run: |
          $version = "${{ env.MAJOR_VERSION }}.${{ env.MINOR_VERSION }}.${{ github.run_number }}"
          "BUILD_BUILDNUMBER=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          $version | Out-File -FilePath build_version.txt
          Write-Host "Build version: $version"
          Write-Host "github.ref=${{ github.ref }}"

      - name: Run CI Build
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          BUILD_BUILDNUMBER: ${{ env.VERSION }}
        run: |
          Write-Host "Running CI Build"
          . ./build.ps1
          Build

      - name: Test Reporter
        uses: dorny/test-reporter@v2.1.1
        if: always()
        with:
          name: Integration Build Test Results
          path: 'build/test/**/*.trx'
          reporter: dotnet-trx

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/test/**/*.trx
          retention-days: 2

      - name: Upload build_version.txt artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: build-version
          path: build_version.txt
          retention-days: 2

      - name: Mark PR as ready for review
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          echo "Looking for PR from branch: $BRANCH_NAME"
          PR_NUMBER=$(gh pr list --head "$BRANCH_NAME" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$PR_NUMBER" ]; then
            echo "Found PR #$PR_NUMBER, marking as ready for review..."
            gh pr ready "$PR_NUMBER" || echo "PR may already be ready or unable to mark ready"
          else
            echo "No open PR found for branch $BRANCH_NAME"
          fi
