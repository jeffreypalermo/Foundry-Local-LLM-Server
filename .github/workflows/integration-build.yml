name: Integration Build
run-name: "1.0.${{ github.run_number }} • Integration Build • ${{ github.head_ref || github.ref_name }}"
on:
  push:
  workflow_dispatch:
env:
  MAJOR_VERSION: 1
  MINOR_VERSION: 0

jobs:
  integration-build:
    name: Integration Build
    runs-on: windows-latest
    concurrency:
      group: integration-build-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Set Version
        shell: pwsh
        run: |
          $version = "${{ env.MAJOR_VERSION }}.${{ env.MINOR_VERSION }}.${{ github.run_number }}"
          "BUILD_BUILDNUMBER=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Build version: $version"

      - name: Restore
        run: dotnet restore FoundryLocalLlmServer.sln

      - name: Build
        run: dotnet build FoundryLocalLlmServer.sln --no-restore --configuration Release

      - name: Run Unit Tests
        run: >
          dotnet test FoundryLocalLlmServer.UnitTests/FoundryLocalLlmServer.UnitTests.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=unit-tests.trx"
          --results-directory build/test

      # Start the server in stub mode so ServerFixture.IsRunningAsync() returns true
      # and the collection fixture reuses it instead of trying to launch Foundry Local.
      # GPU-Required tests are filtered out — they need a real CUDA GPU and model cache.
      - name: Start server in stub mode
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "FoundryLocalLlmServer.Server/bin/Release" -Recurse -Filter "FoundryLocalLlmServer.Server.exe" | Select-Object -First 1
          if (-not $exe) { throw "Server EXE not found — did the build succeed?" }
          Write-Host "Starting $($exe.FullName)"
          $env:ASPNETCORE_URLS = "http://localhost:5537"
          $env:FoundryLocal__UseStubResponses = "true"
          Start-Process -FilePath $exe.FullName `
            -WorkingDirectory (Split-Path $exe.FullName) `
            -NoNewWindow `
            -PassThru
          # Wait up to 30s for the server to be healthy
          $deadline = (Get-Date).AddSeconds(30)
          $ready = $false
          while ((Get-Date) -lt $deadline) {
            try {
              $r = Invoke-WebRequest -Uri "http://localhost:5537/api/foundry" -TimeoutSec 3 -ErrorAction SilentlyContinue
              if ($r.StatusCode -lt 500) { $ready = $true; break }
            } catch { }
            Start-Sleep -Milliseconds 500
          }
          if (-not $ready) { throw "Server did not become ready on http://localhost:5537 within 30s" }
          Write-Host "Server is ready."

      # Only run tests that are safe in CI (no GPU, no real Foundry runtime):
      #   OpenAiCompatibilityTests  — uses ServerFactory (WebApplicationFactory + stub mode)
      #   FoundryServiceHelperAliasTests — pure logic tests, no server required
      # Category!=GPU-Required is intentionally NOT used here: when a test has multiple
      # Category traits (e.g. Category=Integration AND Category=GPU-Required) xunit will
      # include it because Category=Integration satisfies the != condition.
      - name: Run Integration Tests (stub mode, non-GPU)
        run: >
          dotnet test FoundryLocalLlmServer.IntegrationTests/FoundryLocalLlmServer.IntegrationTests.csproj
          --no-build --configuration Release
          --filter "FullyQualifiedName~OpenAiCompatibilityTests|FullyQualifiedName~FoundryServiceHelperAliasTests"
          --logger "trx;LogFileName=integration-tests.trx"
          --results-directory build/test

      - name: Test Reporter
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Build Test Results
          path: 'build/test/**/*.trx'
          reporter: dotnet-trx

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-integration
          path: build/test/**/*.trx
          retention-days: 2

      - name: Mark PR as ready for review
        if: success()
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $branch = "${{ github.ref }}" -replace '^refs/heads/', ''
          $prNumber = gh pr list --head $branch --state open --json number --jq '.[0].number' 2>$null
          if ($prNumber) {
            gh pr ready $prNumber 2>$null
          }
